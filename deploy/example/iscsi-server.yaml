---
apiVersion: v1
kind: Service
metadata:
  name: iscsi-server
  namespace: default
spec:
  type: ClusterIP
  ports:
    - port: 3260
      targetPort: 3260
      protocol: TCP
  selector:
    app: iscsi-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iscsi-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iscsi-server
  template:
    metadata:
      labels:
        app: iscsi-server
    spec:
      containers:
        - name: tgtd
          image: andyzhangx/tgtd:latest
          securityContext:
            privileged: true
          ports:
            - containerPort: 3260
          env:
            - name: DISK_SIZE
              value: "1024"
            - name: IQN
              value: "iqn.2026-01.com.test:storage"
